<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OddsGod — Player Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --black:#080808;--dark:#0d0d0d;--card:#111;--card2:#141414;
      --border:#1e1e1e;--border2:#252525;
      --gold:#C9A84C;--gold-lt:#E8C96A;--gold-dim:#7A6330;
      --white:#F0F0F0;--muted:#666;--muted2:#888;
      --green:#2ECC71;--red:#E74C3C;--blue:#3B82F6;
    }
    html,body{min-height:100%;background:var(--black);color:var(--white);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}

    /* NAV */
    nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:rgba(8,8,8,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .nav-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.08em;color:var(--gold);text-decoration:none}
    .nav-back{display:flex;align-items:center;gap:6px;color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.2s}
    .nav-back:hover{color:var(--white)}
    .nav-right{display:flex;align-items:center;gap:12px}
    .live-pill{display:inline-flex;align-items:center;gap:5px;background:rgba(46,204,113,0.08);border:1px solid rgba(46,204,113,0.2);border-radius:20px;padding:3px 10px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--green)}
    .ldot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:lping 1.6s ease-out infinite;flex-shrink:0}
    @keyframes lping{0%{box-shadow:0 0 0 0 rgba(46,204,113,0.6)}70%{box-shadow:0 0 0 7px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}

    /* HERO */
    .hero{background:var(--dark);border-bottom:1px solid var(--border);padding:32px 24px}
    .hero-inner{max-width:1100px;margin:0 auto;display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap}
    .player-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--gold);flex-shrink:0;border:3px solid var(--gold-dim);overflow:hidden;position:relative}
    .player-avatar img{width:130%;height:130%;object-fit:cover;object-position:top center;position:absolute;top:-5px;left:-15%}
    .player-avatar .fallback{position:relative;z-index:1}
    .hero-info{flex:1;min-width:200px}
    .hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,5vw,64px);line-height:0.95;letter-spacing:0.02em;color:var(--white)}
    .hero-sub{display:flex;align-items:center;gap:10px;margin-top:8px;flex-wrap:wrap}
    .hero-team{font-size:14px;font-weight:600;color:var(--gold)}
    .hero-pos{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);background:var(--border);padding:3px 8px;border-radius:3px}
    .hero-sport{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border-radius:3px}
    .b-nba{background:rgba(59,130,246,0.15);color:#60a5fa}
    .b-nfl{background:rgba(201,168,76,0.15);color:var(--gold)}
    .b-mlb{background:rgba(46,204,113,0.12);color:var(--green)}
    .inj-banner{margin-top:10px;display:inline-flex;align-items:center;gap:6px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:4px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--red)}
    .hero-stats{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-left:auto;align-self:center}
    .hs-item{text-align:center;padding:14px 20px;border-right:1px solid var(--border);background:var(--card)}
    .hs-item:last-child{border-right:none}
    .hs-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--gold);letter-spacing:0.02em;line-height:1}
    .hs-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-top:3px}

    /* TABS */
    .tabs{border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;overflow-x:auto}
    .tab-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:14px 18px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color 0.2s,border-color 0.2s}
    .tab-btn:hover{color:var(--white)}
    .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

    /* CONTENT */
    .page-content{max-width:1100px;margin:0 auto;padding:24px}
    .tab-view{display:none;flex-direction:column;gap:20px}
    .tab-view.active{display:flex}

    /* PANELS */
    .panel{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden}
    .panel-head{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border)}
    .panel-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.06em;color:var(--white)}
    .panel-tag{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted)}

    /* STAT CARDS */
    .stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:14px 16px;position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent)}
    .sc-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
    .sc-val{font-family:'Bebas Neue',sans-serif;font-size:32px;line-height:1;letter-spacing:0.02em}
    .sc-sub{font-size:11px;color:var(--muted);margin-top:3px}

    /* GAME LOG TABLE */
    .game-table{width:100%;border-collapse:collapse}
    .game-table th{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);padding:8px 14px;text-align:left;background:var(--dark);border-bottom:1px solid var(--border);white-space:nowrap}
    .game-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted2);vertical-align:middle}
    .game-table tr:last-child td{border-bottom:none}
    .game-table tr:hover td{background:#161616}
    td.bright{color:var(--white);font-weight:600}
    td.gold{color:var(--gold);font-family:'JetBrains Mono',monospace;font-weight:600}
    td.green{color:var(--green);font-family:'JetBrains Mono',monospace;font-weight:600}
    td.red{color:var(--red);font-family:'JetBrains Mono',monospace;font-weight:600}
    .result-w{background:rgba(46,204,113,0.15);color:var(--green);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px}
    .result-l{background:rgba(231,76,60,0.15);color:var(--red);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px}

    /* RADAR CHART */
    .radar-wrap{display:flex;align-items:center;justify-content:center;gap:40px;padding:24px;flex-wrap:wrap}
    .radar-labels{display:flex;flex-direction:column;gap:10px}
    .radar-label-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted2)}
    .radar-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0}
    .radar-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;width:100px}
    .radar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 1s ease}
    .radar-score{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--gold);width:24px;text-align:right}

    /* PROP LINES */
    .prop-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border)}
    .prop-row:last-child{border-bottom:none}
    .prop-name{flex:1;font-size:13px;color:var(--white);font-weight:600}
    .prop-line-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);letter-spacing:0.02em;width:60px;text-align:center}
    .prop-ou{display:flex;gap:6px}
    .prop-btn{padding:5px 12px;border-radius:3px;border:1px solid var(--border);background:none;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.18s;white-space:nowrap}
    .prop-btn-o{color:var(--green)}
    .prop-btn-o.active,.prop-btn-o:hover{background:rgba(46,204,113,0.12);border-color:var(--green)}
    .prop-btn-u{color:var(--red)}
    .prop-btn-u.active,.prop-btn-u:hover{background:rgba(231,76,60,0.12);border-color:var(--red)}
    .prop-hit-rate{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);width:70px;text-align:right}

    /* TREND BARS */
    .trend-row{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid var(--border)}
    .trend-row:last-child{border-bottom:none}
    .trend-label{font-size:12px;color:var(--muted2);width:140px;flex-shrink:0}
    .trend-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .trend-fill-pos{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold-dim),var(--gold));transition:width 1s ease}
    .trend-fill-neg{height:100%;border-radius:3px;background:linear-gradient(90deg,#7f1d1d,var(--red));transition:width 1s ease}
    .trend-val{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;width:36px;text-align:right;flex-shrink:0}

    /* 2-COL GRID */
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:700px){.two-col{grid-template-columns:1fr}.hero-stats{width:100%;margin-left:0}}
  </style>
</head>

// ── URL PARSING ──
function getPlayerId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || 'lebron-james';
}

function slugify(name) {
  return name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
}

// ── RENDER ──
function renderPlayer(id) {
  const p = PLAYERS[id] || PLAYERS['lebron-james'];

  // hero
  document.title = `OddsGod — ${p.name}`;
  // Set avatar image
  const avatarEl = document.getElementById('p-avatar');
  const fallbackEl = document.getElementById('p-avatar-text');
  if(fallbackEl) fallbackEl.textContent = p.initials;
  const oldImg = avatarEl.querySelector('img');
  if(oldImg) oldImg.remove();
  if(p.photoUrl) {
    const img = document.createElement('img');
    img.src = p.photoUrl;
    img.alt = p.name;
    img.onerror = function(){ this.style.display='none'; if(fallbackEl) fallbackEl.style.display=''; };
    avatarEl.insertBefore(img, fallbackEl);
  }
  document.getElementById('p-name').textContent   = p.name;
  document.getElementById('p-team').textContent   = p.team;
  document.getElementById('p-pos').textContent    = p.pos;
  document.getElementById('p-sport').textContent  = p.sport;
  document.getElementById('p-sport').className    = `hero-sport ${p.sport==='NBA'?'b-nba':p.sport==='NFL'?'b-nfl':'b-mlb'}`;

  const injBanner = document.getElementById('p-inj-banner');
  if(p.injury.status==='out'){
    injBanner.style.display='inline-flex';
    injBanner.textContent=`⚠ OUT — ${p.injury.note}`;
    injBanner.style.color='var(--red)';
  } else if(p.injury.status==='questionable'){
    injBanner.style.display='inline-flex';
    injBanner.textContent=`⚠ QUESTIONABLE — ${p.injury.note}`;
    injBanner.style.color='#F59E0B';
    injBanner.style.borderColor='rgba(245,158,11,0.3)';
    injBanner.style.background='rgba(245,158,11,0.1)';
  } else {
    injBanner.style.display='none';
  }

  // hero stats
  document.getElementById('p-hero-stats').innerHTML = p.heroStats.map(s=>`
    <div class="hs-item"><div class="hs-val">${s.val}</div><div class="hs-lbl">${s.lbl}</div></div>
  `).join('');

  // season stats
  document.getElementById('p-season-stats').innerHTML = p.seasonStats.map(s=>`
    <div class="stat-card">
      <div class="sc-label">${s.lbl}</div>
      <div class="sc-val" style="color:${s.color}">${s.val}</div>
      <div class="sc-sub">${s.sub}</div>
    </div>
  `).join('');

  // radar
  document.getElementById('p-radar').innerHTML = p.radar.map(r=>`
    <div class="radar-label-row">
      <div class="radar-dot"></div>
      <div style="width:90px;font-size:12px;color:var(--muted2)">${r.label}</div>
      <div class="radar-bar"><div class="radar-fill" style="width:0%" data-w="${r.val}%"></div></div>
      <div class="radar-score">${r.val}</div>
    </div>
  `).join('');
  setTimeout(()=>document.querySelectorAll('.radar-fill').forEach(el=>el.style.width=el.dataset.w),50);

  // injury
  const injStatus = document.getElementById('p-inj-status-big');
  const sc = p.injury.status==='out'?'var(--red)':p.injury.status==='questionable'?'#F59E0B':'var(--green)';
  injStatus.style.color = sc;
  injStatus.textContent = p.injury.status.toUpperCase() + (p.injury.note!=='None'?' — '+p.injury.note:'');
  document.getElementById('p-inj-detail').textContent = p.injury.detail;
  document.getElementById('p-inj-impact').innerHTML   = p.injury.impact;

  // game log headers
  const headHtml = `<tr>${p.logHeaders.map(h=>`<th>${h}</th>`).join('')}</tr>`;
  document.getElementById('p-log-head').innerHTML  = headHtml;
  document.getElementById('p-log-head2').innerHTML = headHtml;

  // game log rows
  const logRows = p.gameLog.map(row=>`<tr>
    <td>${row[0]}</td>
    <td class="bright">${row[1]}</td>
    <td><span class="${row[2].startsWith('W')?'result-w':'result-l'}">${row[2].startsWith('W')?'W':'L'}</span> ${row[2].slice(2)}</td>
    ${row.slice(3).map((v,i)=>`<td class="${i===0?'gold':''}">${v}</td>`).join('')}
  </tr>`).join('');
  document.getElementById('p-log-short').innerHTML = p.gameLog.slice(0,5).map(row=>`<tr>
    <td>${row[0]}</td>
    <td class="bright">${row[1]}</td>
    <td><span class="${row[2].startsWith('W')?'result-w':'result-l'}">${row[2].startsWith('W')?'W':'L'}</span> ${row[2].slice(2)}</td>
    ${row.slice(3).map((v,i)=>`<td class="${i===0?'gold':''}">${v}</td>`).join('')}
  </tr>`).join('');
  document.getElementById('p-log-full').innerHTML = logRows;

  // props
  document.getElementById('p-props-body').innerHTML = p.props.map(pr=>`
    <div class="prop-row">
      <div class="prop-name">${pr.name}</div>
      <div class="prop-line-num">${pr.line}</div>
      <div class="prop-ou">
        <button class="prop-btn prop-btn-o ${pr.lean==='over'?'active':''}">OVER ${pr.odds.split('/')[0]}</button>
        <button class="prop-btn prop-btn-u ${pr.lean==='under'?'active':''}">UNDER ${pr.odds.split('/')[1]}</button>
      </div>
      <div class="prop-hit-rate">${pr.hitRate}</div>
    </div>
  `).join('');

  // trend stats
  document.getElementById('p-trend-stats').innerHTML = p.trendStats.map(s=>`
    <div class="stat-card">
      <div class="sc-label">${s.lbl}</div>
      <div class="sc-val" style="color:${s.color}">${s.val}</div>
      <div class="sc-sub">${s.sub}</div>
    </div>
  `).join('');

  // trend bars
  document.getElementById('p-trend-bars').innerHTML = p.trendBars.map(t=>`
    <div class="trend-row">
      <div class="trend-label">${t.label}</div>
      <div class="trend-track"><div class="${t.pos?'trend-fill-pos':'trend-fill-neg'}" style="width:0%" data-w="${t.val}%"></div></div>
      <div class="trend-val" style="color:${t.pos?'var(--gold)':'var(--red)'}">${t.val}%</div>
    </div>
  `).join('');
  setTimeout(()=>document.querySelectorAll('.trend-fill-pos,.trend-fill-neg').forEach(el=>el.style.width=el.dataset.w),50);
}

function showTab(name) {
  document.querySelectorAll('.tab-view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
}

// init
// Store referrer so back button works correctly
if(document.referrer && document.referrer.includes(window.location.hostname)) {
  sessionStorage.setItem('playerPageRef', document.referrer);
}

function goBack() {
  const ref = sessionStorage.getItem('playerPageRef');
  sessionStorage.removeItem('playerPageRef');
  if(ref && ref.includes(window.location.hostname)) {
    window.location.href = ref;
  } else {
    window.location.href = '/dashboard';
  }
}

renderPlayer(getPlayerId());

window.addEventListener('pageshow', function(e) {
  if(e.persisted) renderPlayer(getPlayerId());
});
</script>
